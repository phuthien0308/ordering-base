syntax="proto3";

option go_package="github.com/phuthien0308/ordering-base/contracts/product;product";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service ProductService {
    rpc CreateProduct(CreateProductRequest) returns (ProductResponse){}    
    rpc UpdateProduct(UpdateProductRequest) returns (ProductResponse){}
    rpc DeleteProduct(DeleteProductRequest) returns (google.protobuf.Empty){}
    rpc SearchProducts(SearchProductsRequest) returns (SearchProductsResponse){}
}

message Audit {
    google.protobuf.Timestamp created_at = 1;
    string created_by = 2;
    google.protobuf.Timestamp updated_at = 3;
    string updated_by = 4;
}

message Product {
    string sku = 1;
    string name = 2;
    string category = 3;
    string badge = 4;
    double price = 5;
    optional double original_price = 6;
    double rating = 7;
    int32 review_count = 8;
    string image = 9;
    string description = 10;
    repeated string features = 11;
    
    // Dynamic attributes for anything not strictly captured in the UI yet
    map<string, string> attributes = 12;
    Audit audit = 13;
}

message CreateProductRequest {
    string sku = 1; // Assuming SKU is generated by the client or backend
    string name = 2;
    string category = 3;
    string badge = 4;
    double price = 5;
    optional double original_price = 6;
    double rating = 7;
    int32 review_count = 8;
    string image = 9;
    string description = 10;
    repeated string features = 11;
    
    map<string, string> attributes = 12;
}

message UpdateProductRequest {
    string sku = 1; // Required to identify which product to update
    optional string name = 2;
    optional string category = 3;
    optional string badge = 4;
    optional double price = 5;
    optional double original_price = 6;
    optional double rating = 7;
    optional int32 review_count = 8;
    optional string image = 9;
    optional string description = 10;
    repeated string features = 11;
    
    map<string, string> attributes = 12;
}

message DeleteProductRequest {
    string sku = 1;
}

message SearchProductsRequest {
    string query = 1; 
    int32 page_size = 2; 
    string page_token = 3; 
    
    // Allows searching by specific facets (e.g. {"category": "Electronics"})
    map<string, string> attribute_filters = 4;
}

message ProductResponse {
    Product product = 1;
}

message SearchProductsResponse {
    repeated Product products = 2;
    string next_page_token = 3;
}

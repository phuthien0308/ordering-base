name: Generate Protos

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: 'contracts/**/go.sum'

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '25.3'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Go Protoc Plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.9
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Generate Protos
        working-directory: ./contracts
        run: make generate

      - name: Check for unmodified generated files
        run: |
          # Use git diff ignoring the lines containing generated version comments
          if ! git diff -I'^//.*protoc' --exit-code; then
            echo "Generated protobuf files are out of date!"
            echo "Please run 'make generate' locally and commit the results."
            exit 1
          fi
